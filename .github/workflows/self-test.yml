name: Self-test (Dogfooding)

on:
  pull_request_target:
    types: [opened, reopened]
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  slop-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci && npm run build

      - uses: ./
        with:
          slop-score-warn: '6'
          slop-score-close: '12'
